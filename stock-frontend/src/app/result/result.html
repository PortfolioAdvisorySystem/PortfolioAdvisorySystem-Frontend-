<div class="result-container">

  <!-- HEADER -->
  <div class="header-section">
    <div class="profile-label">YOUR RISK PROFILE</div>
    <h1 class="profile-title profile-aggressive">
      ⚡ {{ result?.profile }}
    </h1>
  </div>

  <!-- GAUGE -->
  <div class="gauge-container">
    <div class="gauge-wrapper">

      <svg class="gauge-svg" viewBox="0 0 200 120">

        <!-- background -->
        <path d="M30 100 A70 70 0 0 1 170 100"
              stroke="#333"
              stroke-width="8"
              fill="none"/>

        <!-- progress -->
        <path d="M30 100 A70 70 0 0 1 170 100"
              fill="none"
              class="gauge-progress"
              [attr.stroke]="getGaugeColor(result.score)"
              stroke-width="8"
              [style.stroke-dasharray]="219.9"
              [style.stroke-dashoffset]="219.9 - (219.9 * result.score / 100)">
        </path>

      </svg>

      <div class="gauge-content">
        <div class="score-display">{{ result.score }}</div>
        <div class="score-suffix">/ 100</div>
      </div>

      <!-- <div class="gauge-labels">
        <span>Conservative</span>
        <span>Aggressive</span>
      </div> -->

    </div>
  </div>

  <!-- WHY -->
  <div class="section-card">
    <h2 class="section-title">Why this profile?</h2>

    <div class="explanations">
      <div *ngFor="let exp of explanations" class="explanation-item">
        <span class="bullet">•</span>
        <span>{{ exp }}</span>
      </div>
    </div>
  </div>

  <!-- BREAKDOWN -->
  <div class="section-card">
    <h2 class="section-title">Score Breakdown</h2>

    <div class="breakdown-items">

      <div *ngFor="let item of breakdownList" class="breakdown-item">

        <div class="breakdown-header">
          <span class="breakdown-label">{{ item.label }}</span>
          <span class="breakdown-score">{{ item.score }}/100</span>
        </div>

        <div class="progress-bar">
          <div class="progress-fill"
               [style.width.%]="item.score">
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-section">

    <!-- ALLOCATION -->
    <div class="section-card allocation-card">
      <h2 class="section-title">Suggested Allocation</h2>

      <div class="allocation-chart">
        <svg class="pie-chart" viewBox="0 0 200 200">

          <ng-container *ngFor="let rec of recommendations; let i = index">

            <path
              [attr.d]="getPieSegment(
                recommendations.slice(0, i).reduce((s, r) => s + r.percentage, 0),
                rec.percentage
              )"
              [attr.fill]="rec.color"
              class="pie-segment">
            </path>

          </ng-container>

        </svg>
      </div>

      <div class="allocation-legend">
        <div *ngFor="let rec of recommendations" class="legend-item">
          <div class="legend-color" [style.background]="rec.color"></div>
          <span class="legend-label">{{ rec.category }}</span>
          <span class="legend-percentage">{{ rec.percentage }}%</span>
        </div>
      </div>
    </div>

    <!-- FUNDS -->
    <div class="section-card">
      <h2 class="section-title">Example Funds</h2>

      <div class="funds-list">
        <div *ngFor="let fund of funds" class="fund-item">

          <div class="fund-name">{{ fund.name }}</div>

          <div class="fund-details">
            <span class="fund-category">{{ fund.type }}</span>

            <span class="fund-risk"
                  [ngClass]="'risk-' + fund.risk.toLowerCase().replace(' ', '-')">
              Risk: {{ fund.risk }}
            </span>
          </div>

        </div>
      </div>
    </div>

  </div>

  <!-- RETAKE -->
  <div class="retake-section">
    <button class="retake-btn" (click)="retakeAssessment()">
      ⟳ Retake Assessment
    </button>
  </div>

</div>
